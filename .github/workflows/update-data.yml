name: Update Policy and Report Data

on:
  schedule:
    # 每天北京时间 8:00 执行 (UTC 0:00)
    - cron: '0 0 * * *'
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
      
      - name: Fetch policies data
        run: |
          python scripts/fetch_policies.py
      
      - name: Fetch reports data
        run: |
          python scripts/fetch_reports.py
      
      - name: Check for changes
        id: git-check
        run: |
          git diff --exit-code data/ || echo "changes=true" >> $GITHUB_OUTPUT
      
      - name: Commit and push changes
        if: steps.git-check.outputs.changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          git commit -m "🤖 Auto-update: 政策和研究报告数据 $(date +%Y-%m-%d)"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: No changes detected
        if: steps.git-check.outputs.changes != 'true'
        run: echo "数据无变化，跳过提交"
